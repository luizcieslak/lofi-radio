<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radio Player</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
    }

    .player-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .player-content {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .album-art {
      width: 80px;
      height: 80px;
      border-radius: 10px;
      background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      flex-shrink: 0;
      overflow: hidden;
    }

    .album-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .track-info {
      flex: 1;
      min-width: 0;
    }

    .track-info .title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-info .artist {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-top: 20px;
    }

    .play-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      background: #fff;
      color: #1a1a2e;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;
      flex-shrink: 0;
    }

    .play-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 20px rgba(255, 255, 255, 0.3);
    }

    .play-btn:active {
      transform: scale(0.95);
    }

    .volume-container {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .volume-icon {
      font-size: 16px;
      opacity: 0.7;
    }

    .volume-slider {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.3);
      outline: none;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
    }

    .volume-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      border: none;
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status.live {
      color: #4ade80;
    }

    .status.live::before {
      content: "";
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .error {
      color: #f87171;
      font-size: 12px;
      margin-top: 10px;
    }

    .playlist-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .playlist-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .playlist-header h2 {
      font-size: 16px;
      font-weight: 600;
    }

    .playlist-header .track-count {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
    }

    .track-list {
      list-style: none;
      max-height: 400px;
      overflow-y: auto;
    }

    .track-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      margin-bottom: 6px;
    }

    .track-item.playing {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.3) 0%, rgba(118, 75, 162, 0.3) 100%);
      border: 1px solid rgba(102, 126, 234, 0.5);
    }

    .track-item.playing .playing-indicator {
      display: flex;
    }

    .track-number {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      flex-shrink: 0;
    }

    .playing-indicator {
      display: none;
      align-items: flex-end;
      gap: 2px;
      height: 14px;
    }

    .playing-indicator span {
      width: 3px;
      background: #4ade80;
      border-radius: 1px;
      animation: soundbar 0.6s ease-in-out infinite;
    }

    .playing-indicator span:nth-child(1) { height: 60%; animation-delay: 0s; }
    .playing-indicator span:nth-child(2) { height: 100%; animation-delay: 0.15s; }
    .playing-indicator span:nth-child(3) { height: 40%; animation-delay: 0.3s; }
    .playing-indicator span:nth-child(4) { height: 80%; animation-delay: 0.45s; }

    @keyframes soundbar {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.5); }
    }

    .track-details {
      flex: 1;
      min-width: 0;
    }

    .track-details .track-title {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-details .track-artist {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
    }

    .empty-state {
      text-align: center;
      padding: 30px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
    }

    /* Upload UI Styles */
    .upload-zone {
      border: 2px dashed rgba(255, 255, 255, 0.3);
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }

    .upload-zone:hover, .upload-zone.drag-over {
      border-color: #667eea;
      background: rgba(102, 126, 234, 0.1);
    }

    .upload-btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      font-size: 14px;
    }

    .upload-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .upload-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 13px;
    }

    .file-item-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-right: 10px;
    }

    .file-item-size {
      color: rgba(255, 255, 255, 0.5);
      font-size: 11px;
      margin-right: 10px;
    }

    .file-item-remove {
      background: rgba(255, 107, 107, 0.2);
      border: none;
      color: #ff6b6b;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
    }

    .admin-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      transition: transform 0.2s;
      z-index: 1000;
    }

    .admin-toggle:hover {
      transform: scale(1.1);
    }

    /* Track Management Styles */
    .admin-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .admin-tab {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.7);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .admin-tab.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }

    .admin-tab:hover:not(.active) {
      background: rgba(255, 255, 255, 0.15);
    }

    .track-manager {
      max-height: 400px;
      overflow-y: auto;
    }

    .managed-track {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      margin-bottom: 8px;
      gap: 10px;
    }

    .managed-track:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .managed-track-info {
      flex: 1;
      min-width: 0;
    }

    .managed-track-title {
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .managed-track-artist {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
    }

    .managed-track-actions {
      display: flex;
      gap: 6px;
    }

    .track-action-btn {
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .track-action-btn.edit {
      background: rgba(102, 126, 234, 0.2);
      color: #667eea;
    }

    .track-action-btn.delete {
      background: rgba(255, 107, 107, 0.2);
      color: #ff6b6b;
    }

    .track-action-btn:hover {
      transform: scale(1.05);
    }

    /* Edit Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .modal {
      background: linear-gradient(180deg, #1a1a2e 0%, #16162a 100%);
      border-radius: 16px;
      padding: 24px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .modal h3 {
      margin: 0 0 20px 0;
      font-size: 18px;
    }

    .modal-field {
      margin-bottom: 15px;
    }

    .modal-field label {
      display: block;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 6px;
    }

    .modal-field input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 14px;
      box-sizing: border-box;
    }

    .modal-field input:focus {
      outline: none;
      border-color: #667eea;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .modal-actions button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .modal-actions .cancel {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .modal-actions .save {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }

    @media (max-width: 500px) {
      .player-content {
        flex-direction: column;
        text-align: center;
      }

      .track-info {
        text-align: center;
      }

      .admin-toggle {
        bottom: 15px;
        right: 15px;
        width: 50px;
        height: 50px;
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Player Card -->
    <div class="player-card">
      <div class="player-content">
        <div class="album-art" id="albumArt">🎵</div>
        <div class="track-info">
          <div class="title" id="title">Loading...</div>
          <div class="artist" id="artist">-</div>
        </div>
      </div>

      <div class="controls">
        <button class="play-btn" id="playBtn">▶</button>
        <div class="volume-container">
          <span class="volume-icon">🔊</span>
          <input type="range" class="volume-slider" id="volume" min="0" max="1" step="0.05" value="0.8">
        </div>
      </div>

      <div class="status-bar">
        <div class="status" id="status">Connecting...</div>
        <div id="listeners"></div>
      </div>
      <div class="error" id="error"></div>
    </div>

    <!-- Playlist Card -->
    <div class="playlist-card">
      <div class="playlist-header">
        <h2>Playlist</h2>
        <span class="track-count" id="trackCount">0 tracks</span>
      </div>
      <ul class="track-list" id="trackList">
        <li class="empty-state">Loading tracks...</li>
      </ul>
    </div>

    <!-- Admin Panel -->
    <div class="player-card" id="adminCard" style="display: none;">
      <div class="playlist-header" style="margin-bottom: 15px;">
        <h2>🔐 Admin Panel</h2>
        <button class="close-btn" id="closeAdmin" style="background: transparent; border: none; color: #fff; font-size: 20px; cursor: pointer;">✕</button>
      </div>

      <!-- Auth Section -->
      <div class="auth-section" id="authSection">
        <p style="color: rgba(255,255,255,0.7); margin-bottom: 10px; font-size: 14px;">Enter API key to manage songs:</p>
        <div style="display: flex; gap: 10px;">
          <input type="password" id="apiKeyInput" placeholder="API Key" style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: #fff; font-size: 14px;">
          <button id="authBtn" class="upload-btn">Unlock</button>
        </div>
        <div id="authError" style="color: #ff6b6b; margin-top: 10px; font-size: 13px;"></div>
      </div>

      <!-- Admin Interface (shown after auth) -->
      <div id="adminInterface" style="display: none;">
        <!-- Tabs -->
        <div class="admin-tabs">
          <button class="admin-tab active" data-tab="upload">📤 Upload</button>
          <button class="admin-tab" data-tab="manage">📋 Manage</button>
        </div>

        <!-- Upload Tab -->
        <div class="tab-content" id="uploadTab">
          <div class="upload-zone" id="uploadZone">
            <input type="file" id="fileInput" multiple accept=".mp3" style="display: none;">
            <div class="upload-prompt">
              <div style="font-size: 48px; margin-bottom: 10px;">📁</div>
              <div style="font-size: 16px; font-weight: 600; margin-bottom: 5px;">Drop MP3 files here</div>
              <div style="font-size: 13px; color: rgba(255,255,255,0.6);">or click to browse</div>
              <div style="font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 10px;">Multiple files supported (up to 50MB each)</div>
            </div>
          </div>

          <div id="fileList" style="margin-top: 15px;"></div>

          <button id="uploadBtn" class="upload-btn" style="width: 100%; margin-top: 15px; display: none;">
            Upload <span id="fileCount"></span>
          </button>

          <div id="uploadProgress" style="margin-top: 15px; display: none;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px;">
              <span id="progressText">Uploading...</span>
              <span id="progressPercent">0%</span>
            </div>
            <div style="background: rgba(255,255,255,0.1); border-radius: 10px; height: 8px; overflow: hidden;">
              <div id="progressBar" style="background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); height: 100%; width: 0%; transition: width 0.3s;"></div>
            </div>
          </div>

          <div id="uploadResult" style="margin-top: 15px; padding: 12px; border-radius: 8px; display: none;"></div>
        </div>

        <!-- Manage Tab -->
        <div class="tab-content" id="manageTab" style="display: none;">
          <div id="linksSummary" style="background: rgba(255,255,255,0.05); border-radius: 8px; padding: 12px; margin-bottom: 12px; font-size: 13px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <span>Platform Links Progress</span>
              <span id="linksProgress" style="font-weight: 600; color: #4ade80;">0/0</span>
            </div>
            <div style="background: rgba(255,255,255,0.1); border-radius: 4px; height: 6px; margin-top: 8px; overflow: hidden;">
              <div id="linksProgressBar" style="background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); height: 100%; width: 0%; transition: width 0.3s;"></div>
            </div>
          </div>
          <div class="track-manager" id="trackManager">
            <p style="color: rgba(255,255,255,0.5); text-align: center;">Loading tracks...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Track Modal -->
  <div class="modal-overlay" id="editModal" style="display: none;">
    <div class="modal">
      <h3>✏️ Edit Track</h3>
      <input type="hidden" id="editFilename">
      <div class="modal-field">
        <label>Title</label>
        <input type="text" id="editTitle" placeholder="Track title">
      </div>
      <div class="modal-field">
        <label>Artist</label>
        <input type="text" id="editArtist" placeholder="Artist name">
      </div>
      <div class="modal-field">
        <label>Album</label>
        <input type="text" id="editAlbum" placeholder="Album name">
      </div>
      <div class="modal-field">
        <label>Album Art URL</label>
        <input type="text" id="editArtUrl" placeholder="https://example.com/cover.jpg">
      </div>
      <div class="modal-field">
        <label>Spotify URL</label>
        <input type="text" id="editSpotifyUrl" placeholder="https://open.spotify.com/track/...">
      </div>
      <div class="modal-field">
        <label>YouTube URL</label>
        <input type="text" id="editYoutubeUrl" placeholder="https://www.youtube.com/watch?v=...">
      </div>
      <div class="modal-field">
        <label>Apple Music URL</label>
        <input type="text" id="editAppleUrl" placeholder="https://music.apple.com/...">
      </div>
      <div class="modal-actions">
        <button class="cancel" id="editCancel">Cancel</button>
        <button class="save" id="editSave">Save</button>
      </div>
    </div>
  </div>

  <!-- Floating Admin Button -->
  <button class="admin-toggle" id="adminToggle" title="Admin Upload">🔐</button>

  <audio id="audio" preload="none"></audio>

  <script>
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const volumeSlider = document.getElementById('volume');
    const titleEl = document.getElementById('title');
    const artistEl = document.getElementById('artist');
    const albumArtEl = document.getElementById('albumArt');
    const statusEl = document.getElementById('status');
    const errorEl = document.getElementById('error');
    const listenersEl = document.getElementById('listeners');
    const trackListEl = document.getElementById('trackList');
    const trackCountEl = document.getElementById('trackCount');

    let isPlaying = false;
    let tracks = [];
    let currentIndex = 0;

    // Audio Controls
    function play() {
      audio.src = `/stream?${Date.now()}`;
      audio.play()
        .then(() => {
          isPlaying = true;
          playBtn.textContent = '⏸';
          statusEl.textContent = 'LIVE';
          statusEl.className = 'status live';
          errorEl.textContent = '';
        })
        .catch(err => {
          console.error('Play error:', err);
          errorEl.textContent = 'Failed to play. Click play again.';
        });
    }

    function pause() {
      audio.pause();
      audio.src = '';
      isPlaying = false;
      playBtn.textContent = '▶';
      statusEl.textContent = 'Paused';
      statusEl.className = 'status';
    }

    playBtn.addEventListener('click', () => {
      isPlaying ? pause() : play();
    });

    volumeSlider.addEventListener('input', e => {
      audio.volume = e.target.value;
    });

    audio.volume = volumeSlider.value;

    audio.addEventListener('waiting', () => {
      statusEl.textContent = 'Buffering...';
      statusEl.className = 'status';
    });

    audio.addEventListener('playing', () => {
      statusEl.textContent = 'LIVE';
      statusEl.className = 'status live';
    });

    audio.addEventListener('error', () => {
      errorEl.textContent = 'Stream error. Reconnecting...';
      if (isPlaying) {
        setTimeout(play, 3000);
      }
    });

    // Track Info
    function updateTrackInfo(track) {
      if (!track) {
        titleEl.textContent = 'No track playing';
        artistEl.textContent = '-';
        return;
      }
      titleEl.textContent = track.title || 'Unknown Title';
      artistEl.textContent = track.artist || 'Unknown Artist';
      albumArtEl.innerHTML = track.albumArtUrl
        ? `<img src="${track.albumArtUrl}" alt="Album Art">`
        : '🎵';
    }

    // Playlist Rendering
    function renderTrackList() {
      if (tracks.length === 0) {
        trackListEl.innerHTML = '<li class="empty-state">No tracks found</li>';
        trackCountEl.textContent = '0 tracks';
        return;
      }

      trackCountEl.textContent = `${tracks.length} track${tracks.length !== 1 ? 's' : ''}`;
      trackListEl.innerHTML = tracks.map((track, index) => `
        <li class="track-item${index === currentIndex ? ' playing' : ''}" data-id="${track.id}">
          <div class="track-number">${index + 1}</div>
          <div class="playing-indicator">
            <span></span><span></span><span></span><span></span>
          </div>
          <div class="track-details">
            <div class="track-title">${escapeHtml(track.title)}</div>
            <div class="track-artist">${escapeHtml(track.artist)}</div>
          </div>
        </li>
      `).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function updateCurrentTrack(index) {
      currentIndex = index;
      const items = trackListEl.querySelectorAll('.track-item');
      items.forEach((item, i) => {
        item.classList.toggle('playing', i === currentIndex);
      });
      if (tracks[currentIndex]) {
        updateTrackInfo(tracks[currentIndex]);
      }
    }

    // SSE for playlist updates
    function connectPlaylistSSE() {
      const events = new EventSource('/api/playlist/events');
      events.onmessage = e => {
        try {
          const data = JSON.parse(e.data);
          if (data.type === 'playlist') {
            tracks = data.tracks;
            currentIndex = data.currentIndex;
            renderTrackList();
          } else if (data.type === 'trackChange') {
            currentIndex = data.currentIndex;
            updateCurrentTrack(currentIndex);
            if (data.track) updateTrackInfo(data.track);
          }
        } catch (err) {
          console.error('SSE parse error:', err);
        }
      };
    }

    // SSE for now-playing updates
    function connectNowPlayingSSE() {
      const events = new EventSource('/now-playing/events');
      events.onmessage = e => {
        try {
          const data = JSON.parse(e.data);
          if (data.track) {
            updateTrackInfo(data.track);
            const trackIndex = tracks.findIndex(t => t.id === data.track.id);
            if (trackIndex !== -1 && trackIndex !== currentIndex) {
              updateCurrentTrack(trackIndex);
            }
          }
        } catch (err) {
          console.error('Now playing SSE error:', err);
        }
      };
    }

    // Status polling
    async function updateStatus() {
      try {
        const res = await fetch('/status');
        const data = await res.json();
        if (data.listenerCount !== undefined) {
          listenersEl.textContent = `${data.listenerCount} listener${data.listenerCount !== 1 ? 's' : ''}`;
        }
      } catch (err) {}
    }

    // Init
    async function init() {
      try {
        const res = await fetch('/api/tracks');
        const data = await res.json();
        tracks = data.tracks;
        currentIndex = data.currentIndex;
        renderTrackList();
      } catch (err) {
        trackListEl.innerHTML = '<li class="empty-state">Failed to load tracks</li>';
      }

      try {
        const res = await fetch('/now-playing');
        const data = await res.json();
        if (data.track) updateTrackInfo(data.track);
        statusEl.textContent = 'Ready - Click play';
        statusEl.className = 'status';
      } catch (err) {}

      connectPlaylistSSE();
      connectNowPlayingSSE();
      updateStatus();
      setInterval(updateStatus, 10000);
    }

    // ========================================================================
    // ADMIN FUNCTIONALITY
    // ========================================================================

    let apiKey = localStorage.getItem('radio_api_key') || '';
    let selectedFiles = [];
    let managedTracks = [];

    const adminToggle = document.getElementById('adminToggle');
    const adminCard = document.getElementById('adminCard');
    const closeAdmin = document.getElementById('closeAdmin');
    const authSection = document.getElementById('authSection');
    const adminInterface = document.getElementById('adminInterface');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const authBtn = document.getElementById('authBtn');
    const authError = document.getElementById('authError');
    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const uploadBtn = document.getElementById('uploadBtn');
    const fileCount = document.getElementById('fileCount');
    const uploadProgress = document.getElementById('uploadProgress');
    const progressText = document.getElementById('progressText');
    const progressPercent = document.getElementById('progressPercent');
    const progressBar = document.getElementById('progressBar');
    const uploadResult = document.getElementById('uploadResult');
    const trackManager = document.getElementById('trackManager');
    const editModal = document.getElementById('editModal');

    // Toggle admin panel
    adminToggle.addEventListener('click', () => {
      adminCard.style.display = 'block';
      adminToggle.style.display = 'none';
      if (apiKey) {
        authSection.style.display = 'none';
        adminInterface.style.display = 'block';
        loadManagedTracks();
      }
    });

    closeAdmin.addEventListener('click', () => {
      adminCard.style.display = 'none';
      adminToggle.style.display = 'block';
    });

    // Tab switching
    document.querySelectorAll('.admin-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');

        const tabName = tab.dataset.tab;
        document.getElementById('uploadTab').style.display = tabName === 'upload' ? 'block' : 'none';
        document.getElementById('manageTab').style.display = tabName === 'manage' ? 'block' : 'none';

        if (tabName === 'manage') {
          loadManagedTracks();
        }
      });
    });

    // Authentication
    authBtn.addEventListener('click', async () => {
      const key = apiKeyInput.value.trim();
      if (!key) {
        authError.textContent = 'Please enter an API key';
        return;
      }

      authError.textContent = '';
      authBtn.disabled = true;
      authBtn.textContent = 'Verifying...';

      try {
        const response = await fetch('/admin/songs', {
          headers: { 'X-API-Key': key }
        });

        if (response.ok) {
          apiKey = key;
          localStorage.setItem('radio_api_key', key);
          authSection.style.display = 'none';
          adminInterface.style.display = 'block';
          loadManagedTracks();
        } else {
          authError.textContent = 'Invalid API key';
          apiKey = '';
          localStorage.removeItem('radio_api_key');
        }
      } catch (err) {
        authError.textContent = 'Connection error';
      } finally {
        authBtn.disabled = false;
        authBtn.textContent = 'Unlock';
      }
    });

    // File selection
    uploadZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
      addFiles(Array.from(e.target.files));
      e.target.value = '';
    });

    // Drag and drop
    uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadZone.classList.add('drag-over');
    });

    uploadZone.addEventListener('dragleave', () => {
      uploadZone.classList.remove('drag-over');
    });

    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('drag-over');
      const files = Array.from(e.dataTransfer.files).filter(f => f.name.endsWith('.mp3'));
      addFiles(files);
    });

    function addFiles(files) {
      selectedFiles = [...selectedFiles, ...files];
      renderFileList();
    }

    function removeFile(index) {
      selectedFiles.splice(index, 1);
      renderFileList();
    }

    function renderFileList() {
      if (selectedFiles.length === 0) {
        fileList.innerHTML = '';
        uploadBtn.style.display = 'none';
        return;
      }

      fileList.innerHTML = selectedFiles.map((file, index) => `
        <div class="file-item">
          <div class="file-item-name">🎵 ${file.name}</div>
          <div class="file-item-size">${(file.size / 1024 / 1024).toFixed(2)} MB</div>
          <button class="file-item-remove" onclick="window.removeFileAt(${index})">✕</button>
        </div>
      `).join('');

      uploadBtn.style.display = 'block';
      fileCount.textContent = `${selectedFiles.length} file(s)`;
    }

    window.removeFileAt = removeFile; // Make it globally accessible for inline onclick

    // Upload files
    uploadBtn.addEventListener('click', async () => {
      if (selectedFiles.length === 0) return;

      uploadBtn.disabled = true;
      uploadProgress.style.display = 'block';
      uploadResult.style.display = 'none';

      let uploaded = 0;
      const total = selectedFiles.length;

      for (let i = 0; i < selectedFiles.length; i++) {
        const file = selectedFiles[i];
        progressText.textContent = `Uploading ${file.name}...`;

        try {
          const formData = new FormData();
          formData.append('song', file);

          const response = await fetch('/admin/upload', {
            method: 'POST',
            headers: { 'X-API-Key': apiKey },
            body: formData
          });

          if (response.ok) {
            uploaded++;
          } else {
            console.error(`Failed to upload ${file.name}`);
          }
        } catch (err) {
          console.error(`Error uploading ${file.name}:`, err);
        }

        const percent = Math.round(((i + 1) / total) * 100);
        progressPercent.textContent = `${percent}%`;
        progressBar.style.width = `${percent}%`;
      }

      // Done
      uploadProgress.style.display = 'none';
      uploadResult.style.display = 'block';
      uploadResult.style.background = uploaded === total
        ? 'rgba(74, 222, 128, 0.2)'
        : 'rgba(251, 191, 36, 0.2)';
      uploadResult.style.color = uploaded === total ? '#4ade80' : '#fbbf24';
      uploadResult.innerHTML = `
        <strong>${uploaded}/${total} files uploaded successfully!</strong>
        ${uploaded < total ? '<br>Some files failed to upload. Check console for details.' : ''}
      `;

      selectedFiles = [];
      renderFileList();
      uploadBtn.disabled = false;

      // Playlist will auto-update via SSE
    });

    // ========================================================================
    // TRACK MANAGEMENT
    // ========================================================================

    async function loadManagedTracks() {
      try {
        const res = await fetch('/api/tracks');
        const data = await res.json();
        managedTracks = data.tracks;
        renderManagedTracks();
      } catch (err) {
        trackManager.innerHTML = '<p style="color: #ff6b6b; text-align: center;">Failed to load tracks</p>';
      }
    }

    function renderManagedTracks() {
      if (managedTracks.length === 0) {
        trackManager.innerHTML = '<p style="color: rgba(255,255,255,0.5); text-align: center;">No tracks found</p>';
        document.getElementById('linksProgress').textContent = '0/0';
        document.getElementById('linksProgressBar').style.width = '0%';
        return;
      }

      // Calculate summary
      let tracksWithAllLinks = 0;
      let totalLinks = 0;
      const maxLinks = managedTracks.length * 3;

      trackManager.innerHTML = managedTracks.map(track => {
        const filename = track.path.split('/').pop();
        const hasSpotify = !!track.spotifyUrl;
        const hasYoutube = !!track.youtubeUrl;
        const hasApple = !!track.appleMusicUrl;
        const linksCount = [hasSpotify, hasYoutube, hasApple].filter(Boolean).length;
        
        totalLinks += linksCount;
        if (linksCount === 3) tracksWithAllLinks++;
        
        return `
          <div class="managed-track" data-filename="${escapeHtml(filename)}">
            <div class="managed-track-info">
              <div class="managed-track-title">${escapeHtml(track.title)}</div>
              <div class="managed-track-artist">${escapeHtml(track.artist)}</div>
              <div class="managed-track-links" style="margin-top: 4px; display: flex; gap: 6px; font-size: 12px;">
                <span style="opacity: ${hasSpotify ? 1 : 0.3}" title="${hasSpotify ? 'Spotify ✓' : 'No Spotify link'}">🟢</span>
                <span style="opacity: ${hasYoutube ? 1 : 0.3}" title="${hasYoutube ? 'YouTube ✓' : 'No YouTube link'}">🔴</span>
                <span style="opacity: ${hasApple ? 1 : 0.3}" title="${hasApple ? 'Apple Music ✓' : 'No Apple link'}">⚪</span>
                <span style="color: ${linksCount === 3 ? '#4ade80' : linksCount > 0 ? '#fbbf24' : 'rgba(255,255,255,0.4)'}; font-size: 11px;">${linksCount}/3</span>
              </div>
            </div>
            <div class="managed-track-actions">
              <button class="track-action-btn edit" onclick="openEditModal('${escapeHtml(filename)}')">✏️</button>
              <button class="track-action-btn delete" onclick="deleteTrack('${escapeHtml(filename)}')">🗑️</button>
            </div>
          </div>
        `;
      }).join('');

      // Update progress summary
      const progressPercent = maxLinks > 0 ? Math.round((totalLinks / maxLinks) * 100) : 0;
      document.getElementById('linksProgress').textContent = `${tracksWithAllLinks}/${managedTracks.length} complete (${totalLinks}/${maxLinks} links)`;
      document.getElementById('linksProgressBar').style.width = `${progressPercent}%`;
    }

    // Edit Modal
    async function openEditModal(filename) {
      try {
        const res = await fetch(`/admin/tracks/${encodeURIComponent(filename)}/metadata`, {
          headers: { 'X-API-Key': apiKey }
        });

        if (!res.ok) throw new Error('Failed to load metadata');

        const data = await res.json();
        const meta = data.metadata || {};

        document.getElementById('editFilename').value = filename;
        document.getElementById('editTitle').value = meta.title || '';
        document.getElementById('editArtist').value = meta.artist || '';
        document.getElementById('editAlbum').value = meta.album || '';
        document.getElementById('editArtUrl').value = meta.albumArtUrl || '';
        document.getElementById('editSpotifyUrl').value = meta.spotifyUrl || '';
        document.getElementById('editYoutubeUrl').value = meta.youtubeUrl || '';
        document.getElementById('editAppleUrl').value = meta.appleMusicUrl || '';

        editModal.style.display = 'flex';
      } catch (err) {
        alert('Failed to load track metadata');
      }
    }

    window.openEditModal = openEditModal;

    document.getElementById('editCancel').addEventListener('click', () => {
      editModal.style.display = 'none';
    });

    document.getElementById('editSave').addEventListener('click', async () => {
      const filename = document.getElementById('editFilename').value;
      const updates = {
        title: document.getElementById('editTitle').value,
        artist: document.getElementById('editArtist').value,
        album: document.getElementById('editAlbum').value,
        albumArtUrl: document.getElementById('editArtUrl').value || undefined,
        spotifyUrl: document.getElementById('editSpotifyUrl').value || undefined,
        youtubeUrl: document.getElementById('editYoutubeUrl').value || undefined,
        appleMusicUrl: document.getElementById('editAppleUrl').value || undefined
      };

      try {
        const res = await fetch(`/admin/tracks/${encodeURIComponent(filename)}/metadata`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'X-API-Key': apiKey
          },
          body: JSON.stringify(updates)
        });

        if (!res.ok) throw new Error('Failed to save');

        editModal.style.display = 'none';
        loadManagedTracks();
      } catch (err) {
        alert('Failed to save changes');
      }
    });

    // Close modal on overlay click
    editModal.addEventListener('click', (e) => {
      if (e.target === editModal) {
        editModal.style.display = 'none';
      }
    });

    // Delete Track
    async function deleteTrack(filename) {
      if (!confirm(`Delete "${filename}"? This cannot be undone.`)) return;

      try {
        const res = await fetch(`/admin/songs/${encodeURIComponent(filename)}`, {
          method: 'DELETE',
          headers: { 'X-API-Key': apiKey }
        });

        if (!res.ok) throw new Error('Failed to delete');

        loadManagedTracks();
      } catch (err) {
        alert('Failed to delete track');
      }
    }

    window.deleteTrack = deleteTrack;

    init();
  </script>
</body>
</html>
